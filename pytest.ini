[pytest]
asyncio_mode = auto
testpaths = tests
addopts =
    --cov=src/backend
    --cov-report=term-missing
    --cov-fail-under=80
markers =
    integration: marks tests as integration tests (deselected by default)
    ollama: requires a running Ollama instance
    azure: requires real Azure credentials and network access (costs money)
